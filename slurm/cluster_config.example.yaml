# Cluster configuration for Bouchet Slurm submissions.
# Copy this file to `cluster_config.local.yaml` (gitignored) and fill in the
# real values from Phase 0 outputs.
#
# Slurm scripts are templates that read these values via slurm/_render_scripts.sh.
# The rendered scripts go to slurm/_rendered/ which is also gitignored — they
# contain the verified NetID and absolute paths.

# Yale identity (verified)
netid: "prn22"
email: "prn22@yale.edu"

# Slurm account — VERIFY in Phase 0 via `slurm_checkup.sh`. If different from
# pi_jks79, use what slurm_checkup.sh reports.
account: "pi_jks79"

# Partition selection — set after Phase 0 reads `sinfo` and `qos.sh`.
# pi_jks79 may exist as a partition (verify); otherwise pick from public partitions.
partition_smoke: "devel"                           # short interactive — for the smoke job
partition_production: "gpu_h200"                   # default; switch to scavenge_gpu if queue is long

# GPU type — optimize for QUEUE TIME, not cost. Smaller GPUs typically have
# shorter queues; right-sizing means faster wall-clock results.
gpu_type: "h200"                                   # "h200" / "rtx5000ada" / "rtxpro6000"

# Storage paths — verify in Phase 0 via `mydirectories`.
project_dir: "/home/prn22/project_pi_jks79/mdm_research"
scratch_dir: "/home/prn22/scratch_pi_jks79/mdm_research"

# Conda environment name on Bouchet
conda_env: "mdm"

# Production-array sizing — set in Phase 0 from smoke measurement and
# `sacctmgr show user $USER --associations`.
production_walltime: "06:00:00"                    # ≈ 1.5 × measured smoke wall-time
array_concurrency: 16                              # = max GPUs allowed concurrently per association

# Notification policy
mail_type: "BEGIN,END,FAIL"
