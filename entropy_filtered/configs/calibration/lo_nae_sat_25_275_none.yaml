# Calibration run: variant=none on (N, P) = (25, 275).
# Purpose: determine `num_iterations` for the production array.
# Methodology: train to 50K steps cap; post-hoc detect loss plateau.
#   plateau := first step k where max(loss[k-1000:k]) - min(loss[k-1000:k]) < 0.01
#              AND linear-regression slope over loss[k-1000:k] > -1e-5
# Output: plateau step is reported by the post-processing in slurm/03_calibration.sh.

task: lo_nae_sat

data:
  N: 25
  P: 275
  m: 2
  pad_to: 512
  pad_value: 2
  mask_token_id: 3
  vocab_size: 4
  seed: 42

model:
  hidden: 384
  n_layers: 8
  n_heads: 6
  ff: 1536
  causal: false
  pos_type: rope
  dropout: 0.0
  weight_tie: false
  vocab_size: 4

seed: 0
num_iterations: 50000
batch_size: 128
lr: 1.0e-3
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
eta_min_ratio: 0.1
log_every: 100
ckpt_every: 5000

entropy_filter:
  mode: none
  warmup_steps: 500
  reduction: mean
  H_low: 0.0
  H_high: 1000000.0
  pct_low: 0.25
  pct_high: 0.75
  use_softmax_excluding_mask_token: true
  eps: 1.0e-12

# Plateau-based early stopping. Criterion (in train_filtered._is_plateau):
#   |mean(loss[step-window+1..step]) - mean(loss[step-2W+1..step-W])| / mean(prev) < tolerance
# Checked every 500 training steps starting at step 1000. When triggered, train_filtered
# writes plateau_step.txt = the triggering step and exits cleanly. If the cap is reached
# without plateau, plateau_step.txt = num_iterations (= 50000). Skipped-optim steps
# (filter dropped the entire batch) are excluded from the rolling means.
early_stop:
  enabled: true
  criterion: rolling_mean_relative
  tolerance: 0.005           # 0.5% relative
  window: 500
  check_every: 500
  min_step: 1000

train_size: 100000
train_sample_seed: 123

output_dir: calibration_runs/lo_nae_sat_25_275_none
