# Tiny smoke for entropy_filtered/ — band mode, percentile fallback exercised by
# the smoke (warmup=20 < num_iterations=100 means filter actually fires).

task: lo_nae_sat

data:
  N: 5
  P: 10
  m: 2
  pad_to: 16
  pad_value: 2
  mask_token_id: 3
  vocab_size: 4
  seed: 42

model:
  hidden: 32
  n_layers: 2
  n_heads: 2
  ff: 64
  causal: false
  pos_type: rope
  dropout: 0.0
  weight_tie: false
  vocab_size: 4

seed: 0
num_iterations: 100
batch_size: 64
lr: 1.0e-3
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
eta_min_ratio: 0.1
log_every: 20
ckpt_every: 100

entropy_filter:
  mode: percentile_band         # percentile is robust at tiny scale (no need to tune H_low/high)
  warmup_steps: 20              # short warmup so the filter actually fires during smoke
  reduction: mean
  H_low: 0.0
  H_high: 1000000.0
  pct_low: 0.25
  pct_high: 0.75
  use_softmax_excluding_mask_token: true
  eps: 1.0e-12

train_size: 1000
train_sample_seed: 123

output_dir: runs/smoke_band
